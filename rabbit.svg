<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!-- Rabbit ears -->
  <ellipse cx="38" cy="24" rx="8" ry="24" fill="#d7dadc" opacity="0.9"/>
  <ellipse cx="38" cy="24" rx="4.5" ry="18" fill="#c9a0a0" opacity="0.5"/>
  <ellipse cx="58" cy="18" rx="7" ry="22" fill="#d7dadc" opacity="0.9" transform="rotate(10 58 18)"/>
  <ellipse cx="58" cy="18" rx="4" ry="16" fill="#c9a0a0" opacity="0.5" transform="rotate(10 58 18)"/>
  <!-- Head -->
  <ellipse cx="48" cy="58" rx="22" ry="20" fill="#d7dadc"/>
  <!-- Eye -->
  <circle cx="42" cy="54" r="3.5" fill="#2a1a1a"/>
  <circle cx="41" cy="53" r="1.2" fill="#fff" opacity="0.7"/>
  <!-- Nose -->
  <ellipse cx="38" cy="62" rx="2.5" ry="1.8" fill="#c9a0a0"/>
  <!-- Mouth -->
  <path d="M38 63.5 Q38 67 35 67" stroke="#a08080" stroke-width="0.8" fill="none"/>
  <path d="M38 63.5 Q38 67 41 66" stroke="#a08080" stroke-width="0.8" fill="none"/>
  <!-- Pocket watch chain -->
  <path d="M62 68 Q72 72 76 82" stroke="#c9a040" stroke-width="1.5" fill="none" stroke-dasharray="2 2"/>
  <!-- Pocket watch -->
  <circle cx="78" cy="88" r="14" fill="#2a2a2d" stroke="#c9a040" stroke-width="2"/>
  <circle cx="78" cy="88" r="11" fill="#1a1a1d" stroke="#c9a040" stroke-width="0.5"/>
  <!-- Watch crown -->
  <circle cx="78" cy="73.5" r="2" fill="#c9a040"/>
  <!-- Watch hands -->
  <line x1="78" y1="88" x2="78" y2="80" stroke="#d7dadc" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="78" y1="88" x2="84" y2="85" stroke="#d7dadc" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="78" cy="88" r="1.2" fill="#c9a040"/>
  <!-- Hour markers -->
  <circle cx="78" cy="78.5" r="0.7" fill="#818384"/>
  <circle cx="88" cy="88" r="0.7" fill="#818384"/>
  <circle cx="78" cy="97.5" r="0.7" fill="#818384"/>
  <circle cx="68" cy="88" r="0.7" fill="#818384"/>
  <!-- Paw holding watch -->
  <path d="M64 66 Q68 74 74 78" stroke="#d7dadc" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
